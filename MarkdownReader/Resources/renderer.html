<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="katex.min.css">
<link rel="stylesheet" id="highlight-theme" href="highlight-github.min.css">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --code-bg: #f6f8fa;
    --border: #e1e4e8;
    --blockquote: #6a737d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --text: #e6edf3;
      --code-bg: #161b22;
      --border: #30363d;
      --blockquote: #8b949e;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
    padding: 20px 24px 80px;
    max-width: 780px;
    margin: 0 auto;
    word-break: break-word;
  }
  pre { background: var(--code-bg); border-radius: 8px; padding: 16px; overflow-x: auto; }
  code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.9em; }
  :not(pre) > code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
  blockquote { border-left: 4px solid var(--border); margin: 0; padding: 0 16px; color: var(--blockquote); }
  img { max-width: 100%; border-radius: 6px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; }
  th { background: var(--code-bg); }
  .annotation-highlight { background: rgba(255, 214, 0, 0.4); border-radius: 2px; cursor: pointer; }
  .mermaid { text-align: center; }
</style>
</head>
<body>
<div id="content"></div>

<script src="marked.min.js"></script>
<script src="katex.min.js"></script>
<script src="katex-auto-render.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
<script>
  // 配置 marked
  marked.setOptions({ gfm: true, breaks: true });

  // 配置 mermaid
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  // 渲染 Markdown
  function render(markdown) {
    document.getElementById('content').innerHTML = marked.parse(markdown);
    renderMathInElement(document.getElementById('content'), {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ]
    });
    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    mermaid.run({ nodes: document.querySelectorAll('.language-mermaid') });
    restoreAnnotations();
  }

  // 批注相关
  let annotations = [];

  function setAnnotations(data) {
    annotations = data;
    restoreAnnotations();
  }

  function restoreAnnotations() {
    // 简化实现：重置高亮后重新渲染（MVP 阶段基于字符偏移）
    document.querySelectorAll('.annotation-highlight').forEach(el => {
      el.replaceWith(...el.childNodes);
    });
  }

  // 监听文字选中
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString();
    if (text.length < 1) return;
    window.webkit.messageHandlers.selectionChanged.postMessage({ text });
  });

  // 接收 Swift 调用
  window.renderMarkdown = render;
  window.setAnnotations = setAnnotations;
</script>
</body>
</html>
