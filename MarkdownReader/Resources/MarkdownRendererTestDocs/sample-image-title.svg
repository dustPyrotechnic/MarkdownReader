<svg xmlns="http://www.w3.org/2000/svg" width="360" height="180" viewBox="0 0 360 180" role="img" aria-labelledby="title desc">
  <title id="title">Image with title fixture</title>
  <desc id="desc">A compact local image used to verify image title handling.</desc>
  <rect width="360" height="180" rx="16" fill="#ecfdf5"/>
  <rect x="18" y="18" width="324" height="144" rx="12" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="36" y="82" fill="#064e3b" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">Image title</text>
  <text x="36" y="120" fill="#047857" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">hover / long-press metadata</text>
</svg>
